apis:
  - aid: artillery:artillery-cloud-api
    name: Artillery Cloud API
    description: >-
      Artillery Cloud provides a hosted platform for running distributed load
      tests at scale, storing test results, team collaboration, and integrating
      with CI/CD pipelines. The Artillery Cloud API enables programmatic
      triggering of test runs, retrieval of test results, and management of
      test configurations.
    humanURL: https://www.artillery.io/docs/reference/cli/run-test
    baseURL: https://app.artillery.io/api
    tags:
      - Load Testing
      - Cloud
      - CI/CD
      - Performance
    properties:
      - type: Documentation
        url: https://www.artillery.io/docs/reference/cli/run-test
      - type: GettingStarted
        url: https://www.artillery.io/docs/get-started/get-artillery
