  - type: Features
    data:
      - name: HTTP Load Testing
        description: >-
          Load test HTTP/1 and HTTP/2 REST APIs, GraphQL endpoints, and web
          applications with configurable virtual users, arrival rates, and
          scenario definitions.
      - name: WebSocket and Socket.IO Testing
        description: >-
          Test real-time applications with WebSocket and Socket.IO protocol
          support, enabling load testing of chat, notifications, and streaming
          applications.
      - name: Playwright Integration
        description: >-
          Run Playwright browser-based end-to-end scenarios under load, enabling
          realistic user simulation and synthetic monitoring from the same
          test framework.
      - name: Plugin Ecosystem
        description: >-
          Extensible plugin system with official plugins for gRPC, Kafka, AWS
          Lambda, Kinesis, and community plugins for many other protocols.
      - name: Artillery Cloud
        description: >-
          Hosted cloud platform for running distributed load tests at massive
          scale across multiple cloud regions, with centralized results and
          team collaboration features.
      - name: YAML Test Scenarios
        description: >-
          Human-readable YAML test scenario definitions supporting think time,
          loops, conditional logic, data CSV files, and custom JavaScript
          functions.
  - type: UseCases
    data:
      - name: API Load Testing
        description: >-
          Backend developers and QA engineers run load tests against REST and
          GraphQL APIs to identify performance bottlenecks and ensure stability
          under expected traffic volumes.
      - name: CI/CD Performance Gates
        description: >-
          Engineering teams integrate Artillery into CI/CD pipelines to run
          performance tests on every pull request, failing builds that exceed
          latency or error rate thresholds.
      - name: Synthetic Monitoring
        description: >-
          SREs use Artillery with Playwright to run synthetic monitors that
          continuously validate critical user journeys from multiple cloud
          regions.
      - name: Pre-Launch Stress Testing
        description: >-
          Product teams run stress tests before major launches or sales events
          to identify the maximum capacity of their infrastructure.
  - type: Integrations
    data:
      - name: GitHub Actions
        description: >-
          Official Artillery GitHub Action for running load tests in CI/CD
          pipelines with automatic reporting and performance gate enforcement.
      - name: Datadog
        description: >-
          Artillery publishes metrics to Datadog for real-time monitoring and
          alerting during load test runs.
      - name: AWS Lambda
        description: >-
          Artillery can run distributed load tests using AWS Lambda as the
          execution backend, enabling serverless-scale testing.
      - name: Playwright
        description: >-
          Native Playwright integration for browser-based load testing and
          synthetic monitoring scenarios.
